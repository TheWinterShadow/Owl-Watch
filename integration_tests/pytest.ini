[tool:pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
minversion = 7.0
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

markers =
    integration: Integration tests that require AWS infrastructure
    slow: Tests that take longer than 1 minute to run
    csv_transform: Tests for CSV transformation pipeline

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning